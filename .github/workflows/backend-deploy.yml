name: Meetbowl BE CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deployment mode"
        required: true
        default: split
        type: choice
        options:
          - split
          - all

concurrency:
  group: meetbowl-be-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "25"
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: meetbowl-be
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root-password
          MARIADB_DATABASE: meetbowl
          MARIADB_USER: meetbowl
          MARIADB_PASSWORD: test-meetbowl-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u root -proot-password --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

      rabbitmq:
        image: rabbitmq:3.13-management
        env:
          RABBITMQ_DEFAULT_USER: meetbowl
          RABBITMQ_DEFAULT_PASS: test-rabbitmq-password
          RABBITMQ_DEFAULT_VHOST: /
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout pull request head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout push/workflow ref
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Show checked out revision
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "github_sha=${{ github.sha }}"
          echo "pr_head_sha=${{ github.event.pull_request.head.sha }}"
          git rev-parse HEAD

      - name: Run backend tests
        env:
          SPRING_PROFILES_ACTIVE: test
          MEETBOWL_DB_URL: jdbc:mariadb://127.0.0.1:3306/meetbowl
          MEETBOWL_DB_USERNAME: meetbowl
          MEETBOWL_DB_PASSWORD: test-meetbowl-password
          MEETBOWL_REDIS_HOST: 127.0.0.1
          MEETBOWL_REDIS_PORT: 6379
          MEETBOWL_RABBITMQ_HOST: 127.0.0.1
          MEETBOWL_RABBITMQ_PORT: 5672
          MEETBOWL_RABBITMQ_USERNAME: meetbowl
          MEETBOWL_RABBITMQ_PASSWORD: test-rabbitmq-password
          MEETBOWL_RABBITMQ_VHOST: /
          MEETBOWL_RABBITMQ_EXCHANGE: meetbowl.topic
          MEETBOWL_RABBITMQ_MINUTES_GENERATED_QUEUE: api.minutes.generated
          MEETBOWL_JWT_SECRET: meetbowl-github-actions-jwt-secret-32bytes
          MEETBOWL_INTERNAL_TOKEN: meetbowl-github-actions-internal-token-32bytes
          MEETBOWL_LIVEKIT_URL: http://127.0.0.1:7880
          MEETBOWL_LIVEKIT_API_KEY: devkey
          MEETBOWL_LIVEKIT_API_SECRET: local-livekit-secret-change-me-123456
          MEETBOWL_STT_BASE_URL: http://127.0.0.1:3000/api/v1
          MEETBOWL_AI_BASE_URL: http://127.0.0.1:8000
          MEETBOWL_ELASTICSEARCH_URL: http://127.0.0.1:9200
          AWS_REGION: ap-northeast-2
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          S3_BUCKET: meetbowl-files
          S3_ENDPOINT: http://127.0.0.1:4566
        run: ./gradlew test --no-daemon

  build-and-push:
    name: Build And Push Image
    runs-on: ubuntu-latest
    needs:
      - test
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deploy mode
        id: deploy-mode
        run: |
          set -euo pipefail

          DEPLOY_MODE="split"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.deploy_mode }}" ]; then
            DEPLOY_MODE="${{ github.event.inputs.deploy_mode }}"
          fi

          echo "value=${DEPLOY_MODE}" >> "$GITHUB_OUTPUT"

      - name: Update API desired image tag in SSM
        if: steps.deploy-mode.outputs.value == 'split'
        env:
          API_IMAGE_TAG_SSM_NAME: /meetbowl/prod/be-api/MEETBOWL_BE_IMAGE_TAG
        run: |
          set -euo pipefail

          aws ssm put-parameter \
            --name "$API_IMAGE_TAG_SSM_NAME" \
            --type String \
            --overwrite \
            --value "${IMAGE_TAG}"

      - name: Resolve API blue/green target
        id: api-target
        if: steps.deploy-mode.outputs.value == 'split'
        env:
          API_LISTENER_ARN: ${{ secrets.MEETBOWL_API_LISTENER_ARN }}
          BLUE_ASG_NAME: ${{ secrets.MEETBOWL_API_BLUE_ASG_NAME }}
          BLUE_DEPLOY_PATH: ${{ secrets.MEETBOWL_API_BLUE_DEPLOY_PATH }}
          BLUE_TARGET_GROUP_ARN: ${{ secrets.MEETBOWL_API_BLUE_TARGET_GROUP_ARN }}
          GREEN_ASG_NAME: ${{ secrets.MEETBOWL_API_GREEN_ASG_NAME }}
          GREEN_DEPLOY_PATH: ${{ secrets.MEETBOWL_API_GREEN_DEPLOY_PATH }}
          GREEN_TARGET_GROUP_ARN: ${{ secrets.MEETBOWL_API_GREEN_TARGET_GROUP_ARN }}
        run: |
          set -euo pipefail

          DIRECT_TARGET_GROUP_ARN="$(
            aws elbv2 describe-listeners \
              --listener-arns "$API_LISTENER_ARN" \
              --query 'Listeners[0].DefaultActions[0].TargetGroupArn' \
              --output text
          )"
          WEIGHTED_TARGET_GROUP_ARN="$(
            aws elbv2 describe-listeners \
              --listener-arns "$API_LISTENER_ARN" \
              --query 'Listeners[0].DefaultActions[0].ForwardConfig.TargetGroups[?Weight==`100`].TargetGroupArn | [0]' \
              --output text
          )"

          if [ "$WEIGHTED_TARGET_GROUP_ARN" != "None" ] && [ -n "$WEIGHTED_TARGET_GROUP_ARN" ]; then
            ACTIVE_TARGET_GROUP_ARN="$WEIGHTED_TARGET_GROUP_ARN"
          else
            ACTIVE_TARGET_GROUP_ARN="$DIRECT_TARGET_GROUP_ARN"
          fi

          if [ "$ACTIVE_TARGET_GROUP_ARN" = "$BLUE_TARGET_GROUP_ARN" ]; then
            PREVIOUS_COLOR="blue"
            TARGET_COLOR="green"
            TARGET_ASG_NAME="$GREEN_ASG_NAME"
            TARGET_DEPLOY_PATH="$GREEN_DEPLOY_PATH"
            TARGET_GROUP_ARN="$GREEN_TARGET_GROUP_ARN"
          elif [ "$ACTIVE_TARGET_GROUP_ARN" = "$GREEN_TARGET_GROUP_ARN" ]; then
            PREVIOUS_COLOR="green"
            TARGET_COLOR="blue"
            TARGET_ASG_NAME="$BLUE_ASG_NAME"
            TARGET_DEPLOY_PATH="$BLUE_DEPLOY_PATH"
            TARGET_GROUP_ARN="$BLUE_TARGET_GROUP_ARN"
          else
            echo "active listener target group is neither blue nor green: ${ACTIVE_TARGET_GROUP_ARN}" >&2
            exit 1
          fi

          echo "active_color=${PREVIOUS_COLOR}"
          echo "deploy_color=${TARGET_COLOR}"
          echo "deploy_asg=${TARGET_ASG_NAME}"
          echo "deploy_target_group=${TARGET_GROUP_ARN}"

          {
            echo "previous_color=${PREVIOUS_COLOR}"
            echo "previous_target_group_arn=${ACTIVE_TARGET_GROUP_ARN}"
            echo "target_color=${TARGET_COLOR}"
            echo "asg_name=${TARGET_ASG_NAME}"
            echo "deploy_path=${TARGET_DEPLOY_PATH}"
            echo "target_group_arn=${TARGET_GROUP_ARN}"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy API on ASG instances via SSM
        if: steps.deploy-mode.outputs.value == 'split'
        env:
          API_ASG_NAME: ${{ steps.api-target.outputs.asg_name }}
          API_DEPLOY_PATH: ${{ steps.api-target.outputs.deploy_path }}
        run: |
          set -euo pipefail

          INSTANCE_IDS="$(
            aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$API_ASG_NAME" \
              --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
              --output text
          )"

          if [ -z "${INSTANCE_IDS}" ]; then
            echo "no InService instances found in ASG: ${API_ASG_NAME}"
            exit 1
          fi

          echo "Resolved API ASG instance ids: ${INSTANCE_IDS}"
          aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$API_ASG_NAME" \
            --query 'AutoScalingGroups[0].Instances[*].[InstanceId,LifecycleState,HealthStatus]' \
            --output table

          aws ssm describe-instance-information \
            --query 'InstanceInformationList[*].[InstanceId,PingStatus,PlatformType,AgentVersion]' \
            --output table

          for INSTANCE_ID in ${INSTANCE_IDS}; do
            echo "Checking SSM managed-node state for ${INSTANCE_ID}"
            aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query 'InstanceInformationList[*].[InstanceId,PingStatus,PlatformType,AgentVersion]' \
              --output table
          done

          COMMAND_ID="$(
            aws ssm send-command \
              --document-name AWS-RunShellScript \
              --comment "meetbowl-be api deploy ${IMAGE_TAG}" \
              --instance-ids ${INSTANCE_IDS} \
              --parameters "commands=[\"set -eu\",\"cd ${API_DEPLOY_PATH}\",\"git -c safe.directory=${API_DEPLOY_PATH} fetch --all --prune\",\"git -c safe.directory=${API_DEPLOY_PATH} pull --ff-only\",\"git -c safe.directory=${API_DEPLOY_PATH} rev-parse HEAD\",\"grep -n MEETBOWL_REDIS_SSL_ENABLED be-api/compose.prod.yml\",\"AWS_REGION=${AWS_REGION} ECR_REPOSITORY=${ECR_REPOSITORY} bash scripts/deploy-be-api.sh\",\"chown -R ubuntu:ubuntu ${API_DEPLOY_PATH}/.runtime || true\",\"docker inspect meetbowl-be-api | grep MEETBOWL_REDIS || true\",\"docker inspect meetbowl-be-api | grep MEETBOWL_STT_BASE_URL || true\",\"curl -fsS http://127.0.0.1/healthz\",\"curl -fsS http://127.0.0.1/api/v1/health\"]" \
              --query 'Command.CommandId' \
              --output text
          )"

          for INSTANCE_ID in ${INSTANCE_IDS}; do
            set +e
            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID"
            WAIT_EXIT=$?
            set -e

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
              --output json

            STATUS="$(
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'Status' \
                --output text
            )"

            if [ "$WAIT_EXIT" -ne 0 ] || [ "$STATUS" != "Success" ]; then
              exit 1
            fi
          done

      - name: Verify inactive API target group
        if: steps.deploy-mode.outputs.value == 'split'
        env:
          API_TARGET_GROUP_ARN: ${{ steps.api-target.outputs.target_group_arn }}
        run: |
          set -euo pipefail

          aws elbv2 describe-target-groups \
            --target-group-arns "$API_TARGET_GROUP_ARN" \
            --query 'TargetGroups[*].{TargetGroupName:TargetGroupName,Port:Port,Protocol:Protocol,HealthCheckProtocol:HealthCheckProtocol,HealthCheckPort:HealthCheckPort,HealthCheckPath:HealthCheckPath,Matcher:Matcher.HttpCode}' \
            --output table

          echo "Target health before wait:"
          aws elbv2 describe-target-health \
            --target-group-arn "$API_TARGET_GROUP_ARN" \
            --query 'TargetHealthDescriptions[*].[Target.Id,Target.Port,TargetHealth.State,TargetHealth.Reason,TargetHealth.Description]' \
            --output table

          set +e
          aws elbv2 wait target-in-service \
            --target-group-arn "$API_TARGET_GROUP_ARN"
          WAIT_EXIT=$?
          set -e

          echo "Target health after wait:"
          aws elbv2 describe-target-health \
            --target-group-arn "$API_TARGET_GROUP_ARN" \
            --query 'TargetHealthDescriptions[*].[Target.Id,Target.Port,TargetHealth.State,TargetHealth.Reason,TargetHealth.Description]' \
            --output table

          if [ "$WAIT_EXIT" -ne 0 ]; then
            exit "$WAIT_EXIT"
          fi

      - name: Switch API ALB listener
        if: steps.deploy-mode.outputs.value == 'split'
        env:
          API_LISTENER_ARN: ${{ secrets.MEETBOWL_API_LISTENER_ARN }}
          BLUE_TARGET_GROUP_ARN: ${{ secrets.MEETBOWL_API_BLUE_TARGET_GROUP_ARN }}
          GREEN_TARGET_GROUP_ARN: ${{ secrets.MEETBOWL_API_GREEN_TARGET_GROUP_ARN }}
          TARGET_COLOR: ${{ steps.api-target.outputs.target_color }}
          PREVIOUS_COLOR: ${{ steps.api-target.outputs.previous_color }}
        run: |
          set -euo pipefail

          echo "Switching API listener from ${PREVIOUS_COLOR} to ${TARGET_COLOR}"

          if [ "$TARGET_COLOR" = "blue" ]; then
            BLUE_WEIGHT=100
            GREEN_WEIGHT=0
          elif [ "$TARGET_COLOR" = "green" ]; then
            BLUE_WEIGHT=0
            GREEN_WEIGHT=100
          else
            echo "unknown target color: ${TARGET_COLOR}" >&2
            exit 1
          fi

          DEFAULT_ACTIONS="$(
            printf '[{"Type":"forward","ForwardConfig":{"TargetGroups":[{"TargetGroupArn":"%s","Weight":%s},{"TargetGroupArn":"%s","Weight":%s}]}}]' \
              "$BLUE_TARGET_GROUP_ARN" "$BLUE_WEIGHT" \
              "$GREEN_TARGET_GROUP_ARN" "$GREEN_WEIGHT"
          )"

          aws elbv2 modify-listener \
            --listener-arn "$API_LISTENER_ARN" \
            --default-actions "$DEFAULT_ACTIONS" \
            --output json

          aws elbv2 describe-listeners \
            --listener-arns "$API_LISTENER_ARN" \
            --query 'Listeners[0].DefaultActions' \
            --output json

      - name: Deploy worker on EC2
        if: steps.deploy-mode.outputs.value == 'split'
        env:
          SSH_HOST: ${{ secrets.MEETBOWL_WORKER_EC2_HOST }}
          SSH_USER: ${{ secrets.MEETBOWL_WORKER_EC2_USER }}
          SSH_KEY: ${{ secrets.MEETBOWL_WORKER_EC2_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.MEETBOWL_WORKER_DEPLOY_PATH }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' AWS_REGION='$AWS_REGION' ECR_REPOSITORY='$ECR_REPOSITORY' IMAGE_TAG='$IMAGE_TAG' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if [ ! -x ./scripts/deploy-be-worker.sh ]; then
            echo "expected deploy script at $DEPLOY_PATH/scripts/deploy-be-worker.sh"
            exit 1
          fi

          ./scripts/deploy-be-worker.sh
          EOF

      - name: Deploy legacy all-mode fallback on dedicated EC2
        if: steps.deploy-mode.outputs.value == 'all'
        env:
          SSH_HOST: ${{ secrets.MEETBOWL_FALLBACK_EC2_HOST }}
          SSH_USER: ${{ secrets.MEETBOWL_FALLBACK_EC2_USER }}
          SSH_KEY: ${{ secrets.MEETBOWL_FALLBACK_EC2_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.MEETBOWL_FALLBACK_DEPLOY_PATH }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' AWS_REGION='$AWS_REGION' ECR_REPOSITORY='$ECR_REPOSITORY' IMAGE_TAG='$IMAGE_TAG' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if [ ! -x ./scripts/deploy-be.sh ]; then
            echo "expected deploy script at $DEPLOY_PATH/scripts/deploy-be.sh"
            exit 1
          fi

          ./scripts/deploy-be.sh
          EOF

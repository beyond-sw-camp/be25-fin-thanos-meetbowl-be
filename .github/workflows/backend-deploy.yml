name: Meetbowl BE CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: meetbowl-be-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "25"
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: meetbowl-be
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root-password
          MARIADB_DATABASE: meetbowl
          MARIADB_USER: meetbowl
          MARIADB_PASSWORD: test-meetbowl-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u root -proot-password --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

      rabbitmq:
        image: rabbitmq:3.13-management
        env:
          RABBITMQ_DEFAULT_USER: meetbowl
          RABBITMQ_DEFAULT_PASS: test-rabbitmq-password
          RABBITMQ_DEFAULT_VHOST: /
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout pull request head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout push/workflow ref
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Show checked out revision
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "github_sha=${{ github.sha }}"
          echo "pr_head_sha=${{ github.event.pull_request.head.sha }}"
          git rev-parse HEAD

      - name: Run backend tests
        env:
          SPRING_PROFILES_ACTIVE: test
          MEETBOWL_DB_URL: jdbc:mariadb://127.0.0.1:3306/meetbowl
          MEETBOWL_DB_USERNAME: meetbowl
          MEETBOWL_DB_PASSWORD: test-meetbowl-password
          MEETBOWL_REDIS_HOST: 127.0.0.1
          MEETBOWL_REDIS_PORT: 6379
          MEETBOWL_RABBITMQ_HOST: 127.0.0.1
          MEETBOWL_RABBITMQ_PORT: 5672
          MEETBOWL_RABBITMQ_USERNAME: meetbowl
          MEETBOWL_RABBITMQ_PASSWORD: test-rabbitmq-password
          MEETBOWL_RABBITMQ_VHOST: /
          MEETBOWL_RABBITMQ_EXCHANGE: meetbowl.topic
          MEETBOWL_RABBITMQ_MINUTES_GENERATED_QUEUE: api.minutes.generated
          MEETBOWL_JWT_SECRET: meetbowl-github-actions-jwt-secret-32bytes
          MEETBOWL_INTERNAL_TOKEN: meetbowl-github-actions-internal-token-32bytes
          MEETBOWL_LIVEKIT_URL: http://127.0.0.1:7880
          MEETBOWL_LIVEKIT_API_KEY: devkey
          MEETBOWL_LIVEKIT_API_SECRET: local-livekit-secret-change-me-123456
          MEETBOWL_STT_BASE_URL: http://127.0.0.1:3000/api/v1
          MEETBOWL_AI_BASE_URL: http://127.0.0.1:8000
          MEETBOWL_ELASTICSEARCH_URL: http://127.0.0.1:9200
          AWS_REGION: ap-northeast-2
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          S3_BUCKET: meetbowl-files
          S3_ENDPOINT: http://127.0.0.1:4566
        run: ./gradlew test --no-daemon

  build-and-push:
    name: Build And Push Image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Load CORS origin patterns from SSM
        run: |
          set -euo pipefail

          MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS_SSM_NAME="/meetbowl/prod/be/MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS"

          MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS="$(
            aws ssm get-parameter \
              --name "$MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS_SSM_NAME" \
              --with-decryption \
              --query 'Parameter.Value' \
              --output text
          )"

          echo "::add-mask::$MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS"
          echo "MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS=$MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS" >> "$GITHUB_ENV"

      - name: Deploy on EC2
        env:
          SSH_HOST: ${{ secrets.MEETBOWL_EC2_HOST }}
          SSH_USER: ${{ secrets.MEETBOWL_EC2_USER }}
          SSH_KEY: ${{ secrets.MEETBOWL_EC2_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.MEETBOWL_DEPLOY_PATH }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS: ${{ env.MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' AWS_REGION='$AWS_REGION' ECR_REPOSITORY='$ECR_REPOSITORY' IMAGE_TAG='$IMAGE_TAG' MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS='$MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if [ ! -x ./scripts/deploy-be.sh ]; then
            echo "expected deploy script at $DEPLOY_PATH/scripts/deploy-be.sh"
            exit 1
          fi

          ./scripts/deploy-be.sh
          EOF

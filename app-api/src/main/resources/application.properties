spring.application.name=meetbowl-be
spring.profiles.default=local

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=BINARY

meetbowl.security.jwt.secret=${MEETBOWL_JWT_SECRET:meetbowl-local-development-secret-key-32bytes}
meetbowl.rabbitmq.exchange=${MEETBOWL_RABBITMQ_EXCHANGE:meetbowl.topic}
meetbowl.rabbitmq.producer=api-server
meetbowl.rabbitmq.event-version=1

spring.rabbitmq.host=${MEETBOWL_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${MEETBOWL_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${MEETBOWL_RABBITMQ_USERNAME:meetbowl}
spring.rabbitmq.password=${MEETBOWL_RABBITMQ_PASSWORD:local-rabbitmq-password}
spring.rabbitmq.virtual-host=${MEETBOWL_RABBITMQ_VHOST:/}
spring.rabbitmq.template.mandatory=true
# 선택적 소비 큐가 아직 준비되지 않은 로컬 환경에서도 회의 join/STT 경로까지 같이 죽지 않게 한다.
spring.rabbitmq.listener.simple.missing-queues-fatal=false
spring.rabbitmq.listener.direct.missing-queues-fatal=false
meetbowl.rabbitmq.minutes-generated-queue=${MEETBOWL_RABBITMQ_MINUTES_GENERATED_QUEUE:api.minutes.generated}

meetbowl.security.jwt.expiration-seconds=${MEETBOWL_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
meetbowl.security.refresh-token.expiration-seconds=${MEETBOWL_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
meetbowl.security.internal-token=${MEETBOWL_INTERNAL_TOKEN}
spring.rabbitmq.host=${MEETBOWL_RABBITMQ_HOST}
spring.rabbitmq.port=${MEETBOWL_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${MEETBOWL_RABBITMQ_USERNAME}
spring.rabbitmq.password=${MEETBOWL_RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${MEETBOWL_RABBITMQ_VHOST:/}
meetbowl.livekit.server-url=${MEETBOWL_LIVEKIT_URL}
meetbowl.livekit.api-key=${MEETBOWL_LIVEKIT_API_KEY}
meetbowl.livekit.api-secret=${MEETBOWL_LIVEKIT_API_SECRET}
meetbowl.livekit.token-expiration-seconds=${MEETBOWL_LIVEKIT_TOKEN_EXPIRATION_SECONDS:3600}

meetbowl.ai.base-url=${MEETBOWL_AI_BASE_URL:http://localhost:8000}
meetbowl.stt.base-url=${MEETBOWL_STT_BASE_URL:http://localhost:3000/api/v1}
meetbowl.stt.internal-token=${MEETBOWL_STT_INTERNAL_TOKEN:${MEETBOWL_INTERNAL_TOKEN:meetbowl-local-internal-token-32bytes}}

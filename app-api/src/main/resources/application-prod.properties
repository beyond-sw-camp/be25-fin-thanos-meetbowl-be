spring.datasource.url=${MEETBOWL_DB_URL}
spring.datasource.username=${MEETBOWL_DB_USERNAME}
spring.datasource.password=${MEETBOWL_DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration

meetbowl.cors.allowed-origin-patterns=${MEETBOWL_CORS_ALLOWED_ORIGIN_PATTERNS:}

spring.data.redis.host=${MEETBOWL_REDIS_HOST}
spring.data.redis.port=${MEETBOWL_REDIS_PORT}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

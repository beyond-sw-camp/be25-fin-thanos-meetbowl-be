spring.datasource.url=jdbc:h2:mem:meetbowl-schema-export;MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-only
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=false
spring.main.web-application-type=none

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false
spring.rabbitmq.dynamic=false

# 현재 JPA 매핑을 운영 DB 방언 기준 SQL로 고정해 baseline migration의 출발점으로 사용한다.
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=build/generated-schema/meetbowl-baseline.sql
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=none

meetbowl.security.jwt.secret=meetbowl-schema-export-secret-key-32bytes
meetbowl.security.internal-token=meetbowl-schema-export-internal-token-32bytes
meetbowl.livekit.server-url=http://127.0.0.1:7880
meetbowl.livekit.api-key=devkey
meetbowl.livekit.api-secret=local-livekit-secret-change-me-123456
meetbowl.livekit.token-expiration-seconds=3600
meetbowl.stt.base-url=http://127.0.0.1:3000/api/v1
meetbowl.stt.internal-token=meetbowl-schema-export-internal-token-32bytes
meetbowl.elasticsearch.base-url=http://localhost:9200
meetbowl.elasticsearch.user-index-name=meetbowl-users
meetbowl.elasticsearch.auto-create-index=false
meetbowl.elasticsearch.reindex-batch-size=200
meetbowl.s3.bucket=meetbowl-files
meetbowl.s3.region=ap-northeast-2
meetbowl.s3.endpoint=http://localhost:4566
meetbowl.s3.access-key=test
meetbowl.s3.secret-key=test

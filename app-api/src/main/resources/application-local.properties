spring.datasource.url=${MEETBOWL_DB_URL:jdbc:mariadb://localhost:3306/meetbowl}
spring.datasource.username=${MEETBOWL_DB_USERNAME:meetbowl}
spring.datasource.password=${MEETBOWL_DB_PASSWORD:local-meetbowl-password}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${MEETBOWL_REDIS_HOST:localhost}
spring.data.redis.port=${MEETBOWL_REDIS_PORT:6379}

meetbowl.security.jwt.secret=${MEETBOWL_JWT_SECRET:meetbowl-local-development-secret-key-32bytes}
meetbowl.security.internal-token=${MEETBOWL_INTERNAL_TOKEN:meetbowl-local-internal-token-32bytes}
spring.rabbitmq.host=${MEETBOWL_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${MEETBOWL_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${MEETBOWL_RABBITMQ_USERNAME:meetbowl}
spring.rabbitmq.password=${MEETBOWL_RABBITMQ_PASSWORD:local-rabbitmq-password}
spring.rabbitmq.virtual-host=${MEETBOWL_RABBITMQ_VHOST:/}
meetbowl.livekit.server-url=${MEETBOWL_LIVEKIT_URL:http://localhost:7880}
meetbowl.livekit.api-key=${MEETBOWL_LIVEKIT_API_KEY:devkey}
meetbowl.livekit.api-secret=${MEETBOWL_LIVEKIT_API_SECRET:local-livekit-secret-change-me-123456}
meetbowl.livekit.token-expiration-seconds=${MEETBOWL_LIVEKIT_TOKEN_EXPIRATION_SECONDS:3600}
meetbowl.stt.base-url=${MEETBOWL_STT_BASE_URL:http://localhost:3000/api/v1}
meetbowl.stt.internal-token=${MEETBOWL_STT_INTERNAL_TOKEN:${MEETBOWL_INTERNAL_TOKEN:meetbowl-local-internal-token-32bytes}}

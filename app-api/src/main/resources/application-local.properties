spring.datasource.url=${MEETBOWL_DB_URL:jdbc:mariadb://localhost:3309/meetbowl}
spring.datasource.username=${MEETBOWL_DB_USERNAME:meetbowl}
spring.datasource.password=${MEETBOWL_DB_PASSWORD:thanos123}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${MEETBOWL_REDIS_HOST:localhost}
spring.data.redis.port=${MEETBOWL_REDIS_PORT:6379}

meetbowl.security.jwt.secret=${MEETBOWL_JWT_SECRET:meetbowl-local-development-secret-key-32bytes}
meetbowl.security.internal-token=${MEETBOWL_INTERNAL_TOKEN:meetbowl-local-internal-token-32bytes}
